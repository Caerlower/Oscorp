# Optional: backend + x402 payer as separate services.
# The backend does not call x402-payer — browser payments go direct to the facilitator.
services:
  x402-payer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.x402-payer
    env_file:
      - ../x402-payer/.env
    ports:
      - "8110:8110"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
